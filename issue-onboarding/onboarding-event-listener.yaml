apiVersion: triggers.tekton.dev/v1alpha1
kind: EventListener
metadata:
  name: onboarding-issue-el
spec:
  serviceAccountName: onboarding-issue-reciever-sa
  triggers:
    - name: github-issue-release
      interceptors:
        - github:
            secretRef:
              secretName: github-secret
              secretKey: webhooksecret
            eventTypes:
              - issues
        - cel:
            filter: "(body.issue.title.startsWith('NEW PROJECT')) && (body.action in ['opened'])"
      bindings:
        - kind: TriggerBinding
          ref: onboarding-issue-binding
      template:
        ref: onboarding-issue-template